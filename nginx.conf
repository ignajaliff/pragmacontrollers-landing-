server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresión básica
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # index.html: NUNCA cachear. Es el archivo que apunta a los hashes de los
    # bundles JS/CSS; cada deploy genera hashes nuevos y deben verse al instante.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Assets hasheados (JS/CSS/fuentes/imágenes): cache agresivo de 1 año.
    # El nombre cambia en cada build, así que no hay riesgo de servir algo viejo.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML y navegación del export estático: URLs limpias + sin cache (igual
    # que index.html, así cada deploy aparece al instante sin recargar duro).
    location / {
        try_files $uri $uri/ $uri.html /404.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    error_page 404 /404.html;
}
